<style>

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #F7F5F0;
    --surface: #FFFFFF;
    --border: rgba(0,0,0,0.09);
    --border-strong: rgba(0,0,0,0.16);
    --text: #1A1A1A;
    --text-secondary: #6B6860;
    --text-tertiary: #9A9890;
    --green: #1D9E75;
    --green-light: #E1F5EE;
    --amber: #BA7517;
    --amber-light: #FAEEDA;
    --red: #A32D2D;
    --red-light: #FCEBEB;
    --purple: #534AB7;
    --purple-light: #EEEDFE;
    --teal: #0F6E56;
    --teal-light: #E1F5EE;
    --blue: #185FA5;
    --blue-light: #E6F1FB;
    --coral: #993C1D;
    --coral-light: #FAECE7;
    --drag-over: #EEF9F5;
  }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 2rem 1rem 4rem; }
  .page { max-width: 740px; margin: 0 auto; }
  header { margin-bottom: 1.5rem; }
  header h1 { font-size: 22px; font-weight: 500; letter-spacing: -0.02em; margin-bottom: 2px; }
  header p { font-size: 13px; color: var(--text-secondary); font-family: 'DM Mono', monospace; }

  .top-bar { background: var(--surface); border: 0.5px solid var(--border); border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 1.5rem; flex-wrap: wrap; }
  .progress-wrap { flex: 1; min-width: 180px; }
  .progress-label { font-size: 12px; color: var(--text-secondary); margin-bottom: 6px; }
  .progress-track { height: 5px; background: var(--bg); border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--green); border-radius: 3px; transition: width 0.4s ease; }
  .progress-count { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--text-tertiary); margin-top: 5px; }

  .legend { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .who { display: inline-block; font-size: 10px; font-weight: 500; padding: 2px 7px; border-radius: 20px; font-family: 'DM Mono', monospace; cursor: default; }
  .who-e { background: var(--purple-light); color: var(--purple); }
  .who-c { background: var(--teal-light); color: var(--teal); }
  .who-b { background: var(--amber-light); color: var(--amber); }
  .tag { display: inline-block; font-size: 10px; font-weight: 500; padding: 2px 7px; border-radius: 20px; font-family: 'DM Mono', monospace; cursor: default; }
  .tag-logistics { background: var(--coral-light); color: var(--coral); }
  .tag-admin { background: var(--blue-light); color: var(--blue); }

  .top-actions { display: flex; gap: 8px; align-items: center; }
  .btn { font-size: 12px; font-family: 'DM Sans', sans-serif; background: none; border: 0.5px solid var(--border-strong); border-radius: 8px; padding: 6px 12px; cursor: pointer; transition: background 0.15s; white-space: nowrap; color: var(--text-secondary); }
  .btn:hover { background: var(--bg); }
  .btn.active { background: var(--text); color: white; border-color: var(--text); }
  .btn-danger { color: var(--red); border-color: rgba(163,45,45,0.3); }
  .btn-danger:hover { background: var(--red-light); }

  .phase-header { font-size: 10px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-tertiary); font-family: 'DM Mono', monospace; margin: 1.5rem 0 0.5rem; padding: 0 2px; }

  .day { background: var(--surface); border: 0.5px solid var(--border); border-radius: 10px; overflow: hidden; margin-bottom: 6px; transition: border-color 0.15s; }
  .day.critical { border-left: 3px solid var(--red); }
  .day.important { border-left: 3px solid var(--amber); }
  .day.milestone { border-left: 3px solid var(--green); }
  .day.neutral { border-left: 3px solid var(--border-strong); }
  .day.off { background: var(--bg); border-left: 3px solid var(--border); }
  .day.drag-over { border-color: var(--green); background: var(--drag-over); }
  .day.drag-over .day-tasks { background: var(--drag-over); }

  .day-header { display: flex; align-items: center; cursor: pointer; user-select: none; }
  .day-header:hover { background: rgba(0,0,0,0.015); }
  .day-label { min-width: 112px; padding: 10px 12px; border-right: 0.5px solid var(--border); flex-shrink: 0; }
  .day-date { font-size: 12px; font-weight: 500; }
  .day-name { font-size: 11px; color: var(--text-tertiary); margin-top: 1px; font-family: 'DM Mono', monospace; }
  .day-summary { flex: 1; padding: 10px 14px; font-size: 13px; color: var(--text-secondary); }
  .day-progress { font-size: 11px; color: var(--text-tertiary); padding-right: 4px; white-space: nowrap; font-family: 'DM Mono', monospace; }
  .chevron { font-size: 10px; color: var(--text-tertiary); padding: 0 12px; transition: transform 0.2s; }
  .day.collapsed .chevron { transform: rotate(-90deg); }

  .day-tasks { border-top: 0.5px solid var(--border); padding: 4px 0; min-height: 8px; transition: background 0.15s; }
  .day.collapsed .day-tasks { display: none; }

  /* drop indicator */
  .drop-indicator { height: 2px; background: var(--green); border-radius: 1px; margin: 0 14px; display: none; }
  .drop-indicator.visible { display: block; }

  .task-row {
    display: flex; align-items: flex-start; gap: 10px; padding: 7px 14px;
    border-bottom: 0.5px solid var(--border); transition: background 0.1s;
    position: relative;
  }
  .task-row:last-child { border-bottom: none; }
  .task-row.dragging { opacity: 0.4; background: var(--bg); }
  .task-row.drag-above::before { content: ''; display: block; position: absolute; top: -1px; left: 14px; right: 14px; height: 2px; background: var(--green); border-radius: 1px; }
  .task-row.drag-below::after { content: ''; display: block; position: absolute; bottom: -1px; left: 14px; right: 14px; height: 2px; background: var(--green); border-radius: 1px; }

  .drag-handle {
    width: 14px; flex-shrink: 0; margin-top: 4px; cursor: grab; color: var(--text-tertiary);
    opacity: 0; transition: opacity 0.15s; display: flex; align-items: center; justify-content: center;
    font-size: 11px; line-height: 1;
  }
  .edit-mode .drag-handle { opacity: 1; }
  .drag-handle:active { cursor: grabbing; }

  .task-cb {
    width: 16px; height: 16px; border-radius: 4px; border: 1.5px solid var(--border-strong);
    flex-shrink: 0; margin-top: 2px; display: flex; align-items: center; justify-content: center;
    transition: all 0.15s; background: white; cursor: pointer;
  }
  .task-cb.checked { background: var(--green); border-color: var(--green); }
  .task-cb.checked::after { content: ''; display: block; width: 4px; height: 7px; border: 1.5px solid white; border-top: none; border-left: none; transform: rotate(45deg) translate(-1px, -1px); }

  .task-text-wrap { flex: 1; min-width: 0; }
  .task-text { font-size: 13px; line-height: 1.45; word-break: break-word; }
  .task-text.checked { color: var(--text-tertiary); text-decoration: line-through; }
  .task-text-input {
    font-size: 13px; font-family: 'DM Sans', sans-serif; line-height: 1.45;
    border: 1px solid var(--green); border-radius: 4px; padding: 2px 6px;
    width: 100%; background: white; color: var(--text); outline: none;
    display: none;
  }
  .editing .task-text { display: none; }
  .editing .task-text-input { display: block; }

  .task-actions { display: flex; gap: 4px; flex-shrink: 0; opacity: 0; transition: opacity 0.15s; }
  .edit-mode .task-actions { opacity: 1; }
  .task-btn { font-size: 11px; background: none; border: none; cursor: pointer; color: var(--text-tertiary); padding: 2px 4px; border-radius: 4px; transition: background 0.1s, color 0.1s; line-height: 1; }
  .task-btn:hover { background: var(--bg); color: var(--text); }
  .task-btn.delete:hover { background: var(--red-light); color: var(--red); }

  .badges { display: inline-flex; gap: 4px; flex-wrap: wrap; margin-left: 6px; vertical-align: middle; }

  /* add task row */
  .add-task-row { display: none; align-items: center; gap: 10px; padding: 7px 14px; border-top: 0.5px solid var(--border); }
  .edit-mode .add-task-row { display: flex; }
  .add-task-input { flex: 1; font-size: 13px; font-family: 'DM Sans', sans-serif; border: 1px solid var(--border-strong); border-radius: 6px; padding: 5px 8px; background: var(--bg); outline: none; color: var(--text); }
  .add-task-input:focus { border-color: var(--green); background: white; }
  .add-badge-select { font-size: 11px; font-family: 'DM Mono', monospace; border: 1px solid var(--border-strong); border-radius: 6px; padding: 5px 6px; background: var(--bg); color: var(--text-secondary); outline: none; cursor: pointer; }
  .add-btn { font-size: 12px; font-family: 'DM Sans', sans-serif; background: var(--green); color: white; border: none; border-radius: 6px; padding: 5px 10px; cursor: pointer; white-space: nowrap; }
  .add-btn:hover { opacity: 0.9; }

  /* drag ghost */
  #drag-ghost { position: fixed; pointer-events: none; z-index: 9999; background: white; border: 1px solid var(--green); border-radius: 8px; padding: 6px 12px; font-size: 13px; font-family: 'DM Sans', sans-serif; max-width: 320px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; box-shadow: 0 4px 16px rgba(0,0,0,0.12); display: none; color: var(--text); }
</style>

    if (raw) { phases = JSON.parse(raw); return; }
  } catch(e) {}
  phases = JSON.parse(JSON.stringify(DEFAULT_PHASES));
}
function saveState() {
  try { localStorage.setItem(STATE_KEY, JSON.stringify(phases)); } catch(e) {}
}

function findDay(dayId) {
  for (const ph of phases) for (const d of ph.days) if (d.id === dayId) return d;
  return null;
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function badgeHTML(b) {
  if (b === 'E') return `<span class="who who-e">E</span>`;
  if (b === 'C') return `<span class="who who-c">C</span>`;
  if (b === 'B') return `<span class="who who-b">B</span>`;
  if (b === 'logistics') return `<span class="tag tag-logistics">logistics</span>`;
  if (b === 'admin') return `<span class="tag tag-admin">admin</span>`;
  return '';
}

function renderAll() {
  const root = document.getElementById('checklist-root');
  let html = '';
  for (const ph of phases) {
    html += `<div class="phase-header">${ph.label}</div>`;
    for (const day of ph.days) {
      const total = day.tasks.length;
      const done = day.tasks.filter(t => t.done).length;
      html += `
      <div class="day ${day.type}" id="${day.id}" data-day-id="${day.id}">
        <div class="day-header" onclick="toggleDay('${day.id}')">
          <div class="day-label"><div class="day-date">${day.date}</div><div class="day-name">${day.name}</div></div>
          <div class="day-summary">${day.tasks.slice(0,3).map(t=>t.text.replace(/[<>]/g,'')).join(', ').slice(0,60)}${day.tasks.length>3?'…':''}</div>
          <div class="day-progress">${total > 0 ? done+'/'+total : ''}</div>
          <div class="chevron">▾</div>
        </div>
        <div class="day-tasks" data-day-id="${day.id}"
          ondragover="onDayDragOver(event,'${day.id}')"
          ondragleave="onDayDragLeave(event,'${day.id}')"
          ondrop="onDayDrop(event,'${day.id}')">
          ${day.tasks.map((t,i) => taskHTML(t, day.id, i)).join('')}
          <div class="add-task-row">
            <input class="add-task-input" type="text" placeholder="Add a task…" data-day-id="${day.id}"
              onkeydown="handleAddKey(event,'${day.id}')">
            <select class="add-badge-select" id="badge-select-${day.id}">
              <option value="B">Both</option>
              <option value="E">Emma</option>
              <option value="C">Cole</option>
              <option value="">—</option>
            </select>
            <button class="add-btn" onclick="addTask('${day.id}')">+ Add</button>
          </div>
        </div>
      </div>`;
    }
  }
  root.innerHTML = html;
  if (editMode) root.classList.add('edit-mode');
  else root.classList.remove('edit-mode');
  updateProgress();
}

function taskHTML(t, dayId, idx) {
  const badges = (t.badges||[]).map(badgeHTML).join('');
  return `
  <div class="task-row" id="tr-${t.id}" data-task-id="${t.id}" data-day-id="${dayId}" data-idx="${idx}"
    draggable="false"
    ondragstart="onTaskDragStart(event,'${dayId}','${t.id}',${idx})"
    ondragend="onTaskDragEnd(event)"
    ondragover="onTaskDragOver(event,'${dayId}',${idx})"
    ondragleave="onTaskDragLeave(event)"
    ondrop="onTaskDrop(event,'${dayId}',${idx})">
    <div class="drag-handle" onmousedown="enableDrag('tr-${t.id}')" onmouseup="disableDrag('tr-${t.id}')">⠿</div>
    <div class="task-cb ${t.done?'checked':''}" onclick="toggleTask('${dayId}','${t.id}')"></div>
    <div class="task-text-wrap">
      <div class="task-text ${t.done?'checked':''}">${escapeHTML(t.text)}${badges ? `<span class="badges">${badges}</span>` : ''}</div>
      <input class="task-text-input" type="text" value="${escapeAttr(t.text)}"
        onblur="saveEdit('${dayId}','${t.id}',this)"
        onkeydown="handleEditKey(event,'${dayId}','${t.id}',this)">
    </div>
    <div class="task-actions">
      <button class="task-btn" onclick="startEdit('tr-${t.id}')" title="Edit">✎</button>
      <button class="task-btn delete" onclick="deleteTask('${dayId}','${t.id}')" title="Delete">✕</button>
    </div>
  </div>`;
}

function escapeHTML(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escapeAttr(s) { return s.replace(/"/g,'&quot;'); }

// ── TOGGLE / CHECK ────────────────────────────────────────────────────────────
function toggleDay(dayId) {
  document.getElementById(dayId).classList.toggle('collapsed');
}

function toggleTask(dayId, taskId) {
  const day = findDay(dayId);
  const t = day.tasks.find(x => x.id === taskId);
  t.done = !t.done;
  saveState();
  // just update the checkbox and text visually without full re-render
  const cb = document.querySelector(`#tr-${taskId} .task-cb`);
  const txt = document.querySelector(`#tr-${taskId} .task-text`);
  cb.classList.toggle('checked', t.done);
  txt.classList.toggle('checked', t.done);
  updateProgress();
}

// ── EDIT MODE ─────────────────────────────────────────────────────────────────
function toggleEditMode() {
  editMode = !editMode;
  const btn = document.getElementById('edit-toggle-btn');
  btn.classList.toggle('active', editMode);
  btn.textContent = editMode ? '✓ Done' : '✏️ Edit';
  const root = document.getElementById('checklist-root');
  root.classList.toggle('edit-mode', editMode);
  // toggle draggable on all task rows
  document.querySelectorAll('.task-row').forEach(row => {
    row.draggable = editMode;
  });
}

function enableDrag(rowId) { if (editMode) document.getElementById(rowId).draggable = true; }
function disableDrag(rowId) { /* keep draggable while in edit mode */ }

function startEdit(rowId) {
  const row = document.getElementById(rowId);
  row.classList.add('editing');
  row.querySelector('.task-text-input').focus();
  row.querySelector('.task-text-input').select();
}

function saveEdit(dayId, taskId, input) {
  const val = input.value.trim();
  if (!val) return;
  const day = findDay(dayId);
  const t = day.tasks.find(x => x.id === taskId);
  t.text = val;
  saveState();
  const row = document.getElementById('tr-'+taskId);
  if (row) {
    row.classList.remove('editing');
    const txtEl = row.querySelector('.task-text');
    const badges = (t.badges||[]).map(badgeHTML).join('');
    txtEl.innerHTML = escapeHTML(val) + (badges ? `<span class="badges">${badges}</span>` : '');
  }
}

function handleEditKey(e, dayId, taskId, input) {
  if (e.key === 'Enter') { input.blur(); }
  if (e.key === 'Escape') {
    const day = findDay(dayId);
    const t = day.tasks.find(x => x.id === taskId);
    input.value = t.text;
    document.getElementById('tr-'+taskId).classList.remove('editing');
  }
}

function deleteTask(dayId, taskId) {
  const day = findDay(dayId);
  day.tasks = day.tasks.filter(t => t.id !== taskId);
  saveState();
  const row = document.getElementById('tr-'+taskId);
  if (row) row.remove();
  updateProgress();
  updateDayProgress(dayId);
  updateDaySummary(dayId);
}

function addTask(dayId) {
  const input = document.querySelector(`.add-task-input[data-day-id="${dayId}"]`);
  const val = input.value.trim();
  if (!val) return;
  const sel = document.getElementById('badge-select-'+dayId);
  const badge = sel ? sel.value : 'B';
  const day = findDay(dayId);
  const newTask = { id: uid(), text: val, badges: badge ? [badge] : [], done: false };
  day.tasks.push(newTask);
  saveState();
  input.value = '';
  // insert task row before add-task-row
  const addRow = document.querySelector(`.add-task-row[data-day-id="${dayId}"]`) ||
    document.querySelector(`[data-day-id="${dayId}"] .add-task-row`);
  const container = document.querySelector(`.day-tasks[data-day-id="${dayId}"]`);
  const tempDiv = document.createElement('div');
  tempDiv.innerHTML = taskHTML(newTask, dayId, day.tasks.length-1);
  const newRow = tempDiv.firstElementChild;
  newRow.draggable = editMode;
  if (addRow && addRow.parentNode === container) {
    container.insertBefore(newRow, addRow);
  } else {
    container.appendChild(newRow);
  }
  updateProgress();
  updateDayProgress(dayId);
  updateDaySummary(dayId);
  input.focus();
}

function handleAddKey(e, dayId) {
  if (e.key === 'Enter') addTask(dayId);
}

// ── DRAG AND DROP ─────────────────────────────────────────────────────────────
let dragOverDay = null;

function onTaskDragStart(e, dayId, taskId, idx) {
  dragSrcDayId = dayId;
  dragSrcTask = taskId;
  dragSrcIndex = idx;
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', taskId);
  // show ghost
  const ghost = document.getElementById('drag-ghost');
  const day = findDay(dayId);
  const t = day.tasks.find(x => x.id === taskId);
  ghost.textContent = t.text.slice(0,50) + (t.text.length > 50 ? '…' : '');
  ghost.style.display = 'block';
  e.dataTransfer.setDragImage(ghost, 0, 0);
  setTimeout(() => { document.getElementById('tr-'+taskId)?.classList.add('dragging'); }, 0);
}

function onTaskDragEnd(e) {
  document.getElementById('drag-ghost').style.display = 'none';
  document.querySelectorAll('.task-row').forEach(r => {
    r.classList.remove('dragging','drag-above','drag-below');
  });
  document.querySelectorAll('.day').forEach(d => d.classList.remove('drag-over'));
  dragSrcTask = null; dragSrcDayId = null; dragSrcIndex = null; dragOverDay = null;
}

function onTaskDragOver(e, dayId, idx) {
  if (!dragSrcTask) return;
  e.preventDefault(); e.stopPropagation();
  e.dataTransfer.dropEffect = 'move';
  document.querySelectorAll('.task-row').forEach(r => r.classList.remove('drag-above','drag-below'));
  document.querySelectorAll('.day').forEach(d => d.classList.remove('drag-over'));
  const row = e.currentTarget;
  const rect = row.getBoundingClientRect();
  const mid = rect.top + rect.height / 2;
  if (e.clientY < mid) row.classList.add('drag-above');
  else row.classList.add('drag-below');
}

function onTaskDragLeave(e) {
  e.currentTarget.classList.remove('drag-above','drag-below');
}

function onTaskDrop(e, targetDayId, targetIdx) {
  e.preventDefault(); e.stopPropagation();
  if (!dragSrcTask) return;
  const row = e.currentTarget;
  const rect = row.getBoundingClientRect();
  const mid = rect.top + rect.height / 2;
  const dropBefore = e.clientY < mid;
  moveTask(dragSrcDayId, dragSrcTask, targetDayId, targetIdx, dropBefore);
  document.querySelectorAll('.task-row').forEach(r => r.classList.remove('drag-above','drag-below','dragging'));
  document.querySelectorAll('.day').forEach(d => d.classList.remove('drag-over'));
}

function onDayDragOver(e, dayId) {
  if (!dragSrcTask) return;
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  if (dragOverDay !== dayId) {
    document.querySelectorAll('.day').forEach(d => d.classList.remove('drag-over'));
    document.getElementById(dayId)?.classList.add('drag-over');
    dragOverDay = dayId;
  }
}

function onDayDragLeave(e, dayId) {
  // only remove if leaving the day entirely
  const rel = e.relatedTarget;
  if (!rel || !document.getElementById(dayId)?.contains(rel)) {
    document.getElementById(dayId)?.classList.remove('drag-over');
    if (dragOverDay === dayId) dragOverDay = null;
  }
}

function onDayDrop(e, targetDayId) {
  e.preventDefault();
  if (!dragSrcTask) return;
  document.querySelectorAll('.day').forEach(d => d.classList.remove('drag-over'));
  const targetDay = findDay(targetDayId);
  moveTask(dragSrcDayId, dragSrcTask, targetDayId, targetDay.tasks.length, false);
}

function moveTask(fromDayId, taskId, toDayId, toIdx, before) {
  const fromDay = findDay(fromDayId);
  const toDay = findDay(toDayId);
  const taskIdx = fromDay.tasks.findIndex(t => t.id === taskId);
  if (taskIdx === -1) return;
  const [task] = fromDay.tasks.splice(taskIdx, 1);

  let insertAt = toIdx;
  if (fromDayId === toDayId) {
    // adjust for removal
    if (taskIdx < toIdx) insertAt = toIdx - 1;
  }
  if (!before && fromDayId === toDayId && insertAt >= toDay.tasks.length) {
    toDay.tasks.push(task);
  } else {
    const pos = before ? insertAt : insertAt + 1;
    toDay.tasks.splice(Math.max(0, Math.min(pos, toDay.tasks.length)), 0, task);
  }
  saveState();
  renderAll();
  if (editMode) {
    toggleEditMode(); toggleEditMode(); // re-apply edit mode classes
  }
}

// ── PROGRESS ──────────────────────────────────────────────────────────────────
function updateProgress() {
  const all = document.querySelectorAll('.task-cb').length;
  const done = document.querySelectorAll('.task-cb.checked').length;
  const pct = all ? Math.round(done/all*100) : 0;
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-count').textContent = done + ' of ' + all + ' tasks complete';
  // update per-day
  phases.forEach(ph => ph.days.forEach(d => updateDayProgress(d.id)));
}

function updateDayProgress(dayId) {
  const dayEl = document.getElementById(dayId);
  if (!dayEl) return;
  const rows = dayEl.querySelectorAll('.task-row');
  const done = dayEl.querySelectorAll('.task-cb.checked').length;
  const el = document.getElementById('dprog-'+dayId) || dayEl.querySelector('.day-progress');
  if (el) el.textContent = rows.length > 0 ? done + '/' + rows.length : '';
}

function updateDaySummary(dayId) {
  const day = findDay(dayId);
  if (!day) return;
  const dayEl = document.getElementById(dayId);
  if (!dayEl) return;
  const summary = dayEl.querySelector('.day-summary');
  if (summary) {
    const text = day.tasks.slice(0,3).map(t=>t.text).join(', ').slice(0,60) + (day.tasks.length>3?'…':'');
    summary.textContent = text;
  }
}

function resetAll() {
  if (!confirm('Reset all checkboxes? (Tasks and edits will be preserved)')) return;
  phases.forEach(ph => ph.days.forEach(d => d.tasks.forEach(t => { t.done = false; })));
  saveState();
  renderAll();
}

// ── INIT ──────────────────────────────────────────────────────────────────────
loadState();
renderAll();
</script>
</body>
</html>
